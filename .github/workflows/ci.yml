name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Lint
        run: python -m ruff check src bench tests
      - name: Unit tests
        run: python -m pytest -q -m "not bench"
      - name: Perf gates (1M items)
        run: python -m pytest -q tests/benchmarks -m bench --benchmark-only
      - name: Headless CLI benchmark
        run: python -m bench --ticks 300 --json
